services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=http://api:8000
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://api:8000
      - NODE_ENV=production
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=${AUTH_SECRET}
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - AI_MODEL=${AI_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-4}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-500}
      - SESSIONS_DIR=/sessions
    volumes:
      - sessions:/sessions
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/platform/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app worker --loglevel=info --pool=solo
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SESSIONS_DIR=/sessions
    volumes:
      - sessions:/sessions
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ── Sandbox: restrict dangerous syscalls ──────────────────────────────────
    security_opt:
      - no-new-privileges:true
      - seccomp:./worker-seccomp.json
    # ── Sandbox: cap-drop removes Linux capabilities not needed for ML work ───
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE    # read/write session files owned by different uids
      - SETUID          # celery worker forks
      - SETGID
      - CHOWN
    # ── Resource limits: prevent runaway processes eating host resources ───────
    ulimits:
      nproc: 256        # max processes/threads the container can spawn
      nofile:
        soft: 1024
        hard: 2048
    mem_limit: 4g
    memswap_limit: 4g

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sessions:
  redis_data:
