services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=http://api:8000
        - NEXT_PUBLIC_UPLOAD_URL=${NEXT_PUBLIC_UPLOAD_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://api:8000
      - NODE_ENV=production
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=${AUTH_SECRET}
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - AI_MODEL=${AI_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB_NAME=${MONGO_DB_NAME:-obsidian}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-4}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-500}
      - MAX_TRAINING_MINUTES=${MAX_TRAINING_MINUTES:-10}
      - MAX_MEMORY_GB=${MAX_MEMORY_GB:-12}
      - MAX_OUTPUT_GB=${MAX_OUTPUT_GB:-10}
      - MAX_EPOCHS=${MAX_EPOCHS:-200}
      - SESSIONS_DIR=/sessions
    volumes:
      - sessions:/sessions
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/platform/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app worker --loglevel=info --pool=solo
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SESSIONS_DIR=/sessions
      - MAX_TRAINING_MINUTES=${MAX_TRAINING_MINUTES:-10}
      - MAX_MEMORY_GB=${MAX_MEMORY_GB:-12}
      - MAX_OUTPUT_GB=${MAX_OUTPUT_GB:-10}
      - MAX_EPOCHS=${MAX_EPOCHS:-200}
    volumes:
      - sessions:/sessions
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  research-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks_research.research_celery_app worker --loglevel=info --pool=solo -Q research
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB_NAME=${MONGO_DB_NAME:-obsidian}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - AI_MODEL=${AI_MODEL:-}
      - RESEARCH_ARTIFACTS_DIR=/research_artifacts
      - TRAINING_DOCKER_IMAGE=${TRAINING_DOCKER_IMAGE:-obsidian-trainer:latest}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:-}
      - LAMBDA_API_KEY=${LAMBDA_API_KEY:-}
    volumes:
      - research_artifacts:/research_artifacts
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    # ── Sandbox: restrict dangerous syscalls ──────────────────────────────────
    security_opt:
      - no-new-privileges:true
      - seccomp:./worker-seccomp.json
    # ── Sandbox: cap-drop removes Linux capabilities not needed for ML work ───
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE    # read/write session files owned by different uids
      - SETUID          # celery worker forks
      - SETGID
      - CHOWN
    # ── Resource limits: prevent runaway processes eating host resources ───────
    ulimits:
      nproc: 65536      # TF, PyTorch, and data loaders spawn many threads
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 12g
    memswap_limit: 16g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sessions:
  redis_data:
  mongo_data:
  research_artifacts:
